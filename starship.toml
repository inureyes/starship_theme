# ─────────────────────────────────────────────────────────────
# Host segment (OS icon + hostname)
# ─────────────────────────────────────────────────────────────

[os]
disabled = false
style = "bg:color_bg_hostname fg:color_fg_hostname"
format = '[ $symbol]($style)'

[os.symbols]
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch             = "󰣇"
Artix            = "󰣇"
CentOS = ""
Debian           = "󰣚"
EndeavourOS = ""
Fedora           = "󰣛"
Gentoo           = "󰣨"
Linux            = "󰌽"
Macos            = "󰀵"
Manjaro = ""
Mint             = "󰣭"
Pop = ""
Raspbian         = "󰐿"
Redhat           = "󱄛"
RedHatEnterprise = "󱄛"
SUSE = ""
Ubuntu           = "󰕈"
Windows          = "󰍲"

[hostname]
disabled = false
ssh_only = false
style = "bg:color_bg_hostname fg:color_fg_hostname"
format = '[ $hostname ]($style)'

# ─────────────────────────────────────────────────────────────
# User + directory
# ─────────────────────────────────────────────────────────────

[username]
show_always = true
style_user = "bg:color_bg_user fg:color_fg_user"
style_root = "bg:color_bg_user fg:color_fg_user"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg_directory bg:color_bg_directory"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ─────────────────────────────────────────────────────────────
# Git
# ─────────────────────────────────────────────────────────────

[git_branch]
symbol = ""
style = "bg:color_bg_git"
format = '[[ $symbol $branch ](fg:color_fg_git bg:color_bg_git)]($style)'

[git_status]
style = "bg:color_bg_git"
format = '[[($all_status$ahead_behind )](fg:color_fg_git bg:color_bg_git)]($style)'

# ─────────────────────────────────────────────────────────────
# Language runtimes (shared blue segment)
#
# All language modules share the same style/format — only the
# symbol differs. If you tweak one, consider tweaking the rest.
# ─────────────────────────────────────────────────────────────

[c]
symbol = " "
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[cpp]
symbol = " "
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[rust]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[golang]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[nodejs]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[php]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[java]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[kotlin]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[haskell]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

[python]
symbol = ""
style = "bg:color_bg_language"
format = '[[ $symbol( $version) ](fg:color_fg_language bg:color_bg_language)]($style)'

# ─────────────────────────────────────────────────────────────
# Container / environment tools
# ─────────────────────────────────────────────────────────────

[docker_context]
symbol = ""
style = "bg:color_bg_environment"
format = '[[ $symbol( $context) ](fg:color_fg_environment_accent bg:color_bg_environment)]($style)'

[conda]
style = "bg:color_bg_environment"
format = '[[ $symbol( $environment) ](fg:color_fg_environment_accent bg:color_bg_environment)]($style)'

[pixi]
style = "bg:color_bg_environment"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg_environment bg:color_bg_environment)]($style)'

# ─────────────────────────────────────────────────────────────
# Time + prompt character
# ─────────────────────────────────────────────────────────────

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg_time"
format = '[[  $time ](fg:color_fg_time bg:color_bg_time)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol            = '[](bold fg:color_fg_success)'
error_symbol              = '[](bold fg:color_fg_error)'
vimcmd_symbol             = '[](bold fg:color_fg_vim_normal)'
vimcmd_replace_one_symbol = '[](bold fg:color_fg_vim_replace)'
vimcmd_replace_symbol     = '[](bold fg:color_fg_vim_replace)'
vimcmd_visual_symbol      = '[](bold fg:color_fg_vim_visual)'
