"$schema" = 'https://starship.rs/config-schema.json'

# ─────────────────────────────────────────────────────────────
# Active palette
#
# Change this one line to switch themes. Available palettes:
#   mac, windows, nvidia, amd, intel, lablup, backend_ai, aigo
# ─────────────────────────────────────────────────────────────

palette = 'mac'

# ─────────────────────────────────────────────────────────────
# Prompt layout
# ─────────────────────────────────────────────────────────────

format = """
$os\
$hostname\
[](bg:color_bg_user fg:color_bg_hostname)\
$username\
[](bg:color_bg_directory fg:color_bg_user)\
$directory\
[](fg:color_bg_directory bg:color_bg_git)\
$git_branch\
$git_status\
[](fg:color_bg_git bg:color_bg_language)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_bg_language bg:color_bg_environment)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg_environment bg:color_bg_time)\
$time\
[ ](fg:color_bg_time)\
$line_break$character"""

# ─────────────────────────────────────────────────────────────
# Palettes
# ─────────────────────────────────────────────────────────────

[palettes.nvidia]
# Segment: Host (OS icon + hostname)
color_bg_hostname           = '#d0d0d0'
color_fg_hostname           = '#1a1a1a'

# Segment: User
color_bg_user               = '#76b900'
color_fg_user               = '#0d1a00'

# Segment: Directory
color_bg_directory          = '#5a8f00'
color_fg_directory          = '#f0ffe0'

# Segment: Git
color_bg_git                = '#3f6b00'
color_fg_git                = '#f0ffe0'

# Segment: Language runtimes
color_bg_language           = '#264d00'
color_fg_language           = '#c8f090'

# Segment: Environment tools (docker/conda/pixi)
color_bg_environment        = '#1a2a0d'
color_fg_environment        = '#c8f090'
color_fg_environment_accent = '#76b900'

# Segment: Time
color_bg_time               = '#0d1505'
color_fg_time               = '#c8f090'

# Prompt character states
color_fg_success            = '#76b900'
color_fg_error              = '#e01e1e'
color_fg_vim_normal         = '#76b900'
color_fg_vim_replace        = '#a560b0'
color_fg_vim_visual         = '#d4a017'

